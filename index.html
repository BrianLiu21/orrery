  <body style="background: #04060d">
    <style>
      /* In-universe boot: an accretion disk forming. React replaces this
         the instant the app mounts — no dead loading screen (§9). */
      .boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #04060d;
      }
      .boot .disk {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(255, 178, 77, 0) 0deg,
          rgba(255, 178, 77, 0.08) 120deg,
          rgba(255, 200, 120, 0.5) 300deg,
          rgba(255, 230, 180, 0.95) 350deg,
          rgba(255, 178, 77, 0) 360deg
        );
        -webkit-mask: radial-gradient(circle, transparent 26%, black 32%, black 64%, transparent 70%);
        mask: radial-gradient(circle, transparent 26%, black 32%, black 64%, transparent 70%);
        animation: boot-spin 1.6s linear infinite;
      }
      .boot .core {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #ffd9a0;
        box-shadow: 0 0 24px 6px rgba(255, 190, 110, 0.55);
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
    <div id="root">
      <div class="boot">
        <div class="disk"></div>
        <div class="core"></div>
      </div>
    </div>
    <script>
      // Dev/headless aid: hidden tabs never fire requestAnimationFrame,
      // which blocks R3F initialization entirely. Shim with timers so the
      // app can boot and preview tooling can screenshot it. Visible tabs
      // are untouched.
      if (document.hidden) {
        window.requestAnimationFrame = function (cb) {
          return setTimeout(function () { cb(performance.now()) }, 16)
        }
        window.cancelAnimationFrame = clearTimeout.bind(window)
        // ResizeObserver is also paint-gated when hidden; synthetic resize
        // events make react-use-measure fall back to direct measurement.
        var fire = function () { window.dispatchEvent(new Event('resize')) }
        setTimeout(fire, 300)
        setTimeout(fire, 1000)
        setTimeout(fire, 3000)
      }
    </script>
  </body>
