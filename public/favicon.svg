<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Orrery</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#0c1526"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb45e" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ff8e3c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff7a1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star" cx="42%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="55%" stop-color="#ffd27a"/>
      <stop offset="100%" stop-color="#f59b3e"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- faint background stars -->
  <circle cx="13" cy="14" r="1" fill="#cfe0ff" opacity="0.7"/>
  <circle cx="50" cy="50.5" r="0.8" fill="#9cc4ff" opacity="0.6"/>
  <circle cx="20" cy="48" r="0.7" fill="#ffffff" opacity="0.45"/>
  <circle cx="44" cy="9.5" r="0.7" fill="#ffd2a1" opacity="0.5"/>
  <!-- orbit behind the star (upper arc) -->
  <g transform="rotate(-18 32 32)">
    <path d="M 8 32 A 24 9.5 0 0 1 56 32" fill="none" stroke="#7fd4ff"
      stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- the star: now -->
  <circle cx="32" cy="32" r="17" fill="url(#glow)"/>
  <circle cx="32" cy="32" r="9.5" fill="url(#star)"/>
  <!-- orbit in front of the star (lower arc) -->
  <g transform="rotate(-18 32 32)">
    <path d="M 56 32 A 24 9.5 0 0 1 8 32" fill="none" stroke="#7fd4ff"
      stroke-opacity="0.95" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- a task, approaching -->
  <circle cx="53.2" cy="30.1" r="3.4" fill="#4fe3c1"/>
  <circle cx="52.2" cy="29.1" r="1.1" fill="#d8fff4" opacity="0.85"/>
</svg>
